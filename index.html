<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Melody Karaoke POS</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1c;--card:#0f1929;--card2:#162035;--card3:#1c2a42;
  --gold:#d4af37;--gold2:#f0d060;--green:#22d3a0;--red:#f87171;
  --blue:#60a5fa;--text:#e2e8f0;--text2:#8892b0;--text3:#3d4f6a;
  --border:rgba(212,175,55,0.15);--border2:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--card3);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}
.scr{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.scr.show{display:flex;}

/* LOGIN */
#sLogin{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.07),transparent 60%),var(--bg);}
.lbox{width:90%;max-width:360px;}
.ltop{text-align:center;margin-bottom:24px;}
.ltop .icon{font-size:46px;display:block;margin-bottom:7px;}
.ltop h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);letter-spacing:2px;}
.ltop p{font-size:10px;color:var(--text2);letter-spacing:1px;margin-top:3px;}
.rtabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.rtab{background:var(--card);border:2px solid var(--border2);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .2s;}
.rtab:hover{border-color:var(--border);}
.rtab.on{border-color:var(--gold);background:rgba(212,175,55,.08);}
.rtab span{font-size:22px;display:block;margin-bottom:4px;}
.rtab b{font-size:11px;font-weight:700;color:var(--text2);}
.rtab.on b{color:var(--gold);}
.pdisp{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:13px;text-align:center;font-size:26px;letter-spacing:12px;color:var(--gold);min-height:54px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.pb{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:13px;font-family:'Kanit';font-size:18px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;}
.pb:hover{background:var(--card3);}
.pb:active{transform:scale(.95);}
.pb.del{color:var(--red);font-size:13px;}
.pb.go{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080e1c;border:none;font-size:13px;}
.lhint{font-size:10px;color:var(--text3);text-align:center;margin-top:9px;line-height:1.8;}
.lerr{color:var(--red);font-size:11px;text-align:center;margin-top:4px;min-height:15px;}

/* TOPBAR */
.topbar{height:50px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 13px;}
.tlogo{font-family:'Playfair Display',serif;color:var(--gold);font-size:15px;letter-spacing:2px;padding-right:12px;border-right:1px solid var(--border2);margin-right:2px;flex-shrink:0;}
.tnav-wrap{display:flex;overflow-x:auto;scrollbar-width:none;flex:1;}
.tnav-wrap::-webkit-scrollbar{display:none;}
.tnav{background:transparent;border:none;color:var(--text2);padding:0 12px;height:50px;cursor:pointer;font-family:'Kanit';font-size:12px;font-weight:500;white-space:nowrap;display:flex;align-items:center;border-bottom:3px solid transparent;transition:all .2s;}
.tnav:hover{color:var(--text);}
.tnav.on{color:var(--gold);border-bottom-color:var(--gold);}
.tright{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ttime{font-size:11px;color:var(--text2);}
.rchip{font-size:10px;font-weight:700;padding:4px 9px;border-radius:13px;border:1px solid;}
.rco{background:rgba(212,175,55,.08);border-color:rgba(212,175,55,.3);color:var(--gold);}
.rcs{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);color:var(--blue);}
.tbtn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:4px 9px;border-radius:7px;cursor:pointer;font-family:'Kanit';font-size:10px;}
.tbtn:hover{border-color:var(--red);color:var(--red);}

/* CONTENT */
.content{flex:1;overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;overflow-x:hidden;flex-direction:column;}
.page.on{display:flex;}

/* COMMON */
.btn{padding:8px 13px;border-radius:8px;border:none;cursor:pointer;font-family:'Kanit';font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:none;opacity:.8;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
.bg2{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080e1c;}
.bo{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.bo:hover{border-color:var(--gold);color:var(--text);}
.br2{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);}
.sm{padding:6px 10px;font-size:11px;border-radius:7px;}
.wf{width:100%;}
.inp{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;font-family:'Kanit';font-size:12px;width:100%;outline:none;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:var(--text3);}
.fl{font-size:10px;color:var(--text2);margin-bottom:2px;}
.fr2{display:flex;flex-direction:column;gap:2px;margin-bottom:9px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.shd{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;flex-shrink:0;}
.stitle{font-size:15px;font-weight:700;}
.pad{padding:17px;}
.cb{background:var(--card);border:1px solid var(--border2);border-radius:12px;margin-bottom:12px;}
.chd{padding:10px 13px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.chtl{font-size:12px;font-weight:700;}
.cbd{padding:13px;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;}
.bgg{background:rgba(34,211,160,.12);color:var(--green);}
.bgo{background:rgba(212,175,55,.12);color:var(--gold);}
.bgr{background:rgba(248,113,113,.12);color:var(--red);}
.bgb{background:rgba(96,165,250,.12);color:var(--blue);}

/* ROOMS */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;padding:0 17px 17px;}
.rcard{background:var(--card);border:2px solid var(--border2);border-radius:13px;padding:14px;cursor:pointer;transition:all .22s;position:relative;}
.rcard:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.5);}
.rcard.busy{border-color:rgba(212,175,55,.5);}
.rnum{font-family:'Playfair Display',serif;font-size:21px;color:var(--gold);}
.rcap{font-size:10px;color:var(--text2);margin-bottom:7px;}
.rtimer{font-size:17px;font-weight:700;color:var(--gold2);}
.rbill{font-size:10px;color:var(--text2);margin:2px 0 7px;}
.rqr{position:absolute;top:9px;right:9px;width:25px;height:25px;background:var(--card2);border:1px solid var(--border);color:var(--text2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;}
.rqr:hover{background:var(--gold);color:#080e1c;}

/* POS */
.playout{display:grid;grid-template-columns:1fr 310px;height:100%;overflow:hidden;}
.pl{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border2);}
.ptb{padding:8px 11px;display:flex;gap:7px;align-items:center;border-bottom:1px solid var(--border2);}
.psrch{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;font-family:'Kanit';font-size:11px;flex:1;outline:none;}
.psrch:focus{border-color:var(--gold);}
.pcats{display:flex;gap:5px;padding:7px 11px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border2);flex-shrink:0;}
.pcats::-webkit-scrollbar{display:none;}
.cpill{background:var(--card2);border:1px solid var(--border2);color:var(--text2);padding:4px 12px;border-radius:15px;cursor:pointer;font-family:'Kanit';font-size:11px;white-space:nowrap;}
.cpill.on{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold);font-weight:600;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px;padding:9px 11px;overflow-y:auto;}
.mcard{background:var(--card);border:1px solid var(--border2);border-radius:9px;overflow:hidden;cursor:pointer;transition:all .2s;}
.mcard:hover{border-color:rgba(212,175,55,.4);transform:translateY(-2px);}
.mcard.na{opacity:.45;cursor:not-allowed;}
.mem{height:68px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--card2);}
.mbd{padding:7px 8px;}
.mnm{font-size:11px;font-weight:600;margin-bottom:2px;}
.mpr{font-size:12px;font-weight:700;color:var(--gold);}
.opanel{display:flex;flex-direction:column;overflow:hidden;background:var(--card);}
.ohd{padding:9px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:7px;}
.rsel{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:7px;font-family:'Kanit';font-size:11px;cursor:pointer;outline:none;flex:1;}
.olist{flex:1;overflow-y:auto;padding:7px;}
.oempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:5px;color:var(--text2);font-size:12px;}
.oitem{display:flex;align-items:center;gap:6px;background:var(--card2);border-radius:8px;padding:7px 8px;margin-bottom:5px;}
.oiem{font-size:16px;flex-shrink:0;}
.oinf{flex:1;}
.onm{font-size:11px;font-weight:600;}
.opr{font-size:10px;color:var(--text2);}
.qc{display:flex;align-items:center;gap:3px;}
.qb{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.qb:hover{background:var(--gold);border-color:var(--gold);color:#080e1c;}
.qn{font-size:11px;font-weight:700;min-width:14px;text-align:center;}
.ofoot{padding:9px 12px;border-top:1px solid var(--border2);}
.trow{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding:2px 0;}
.trow.grand{font-size:15px;font-weight:700;color:var(--text);border-top:1px solid var(--border2);margin-top:5px;padding-top:6px;}

/* ORDERS */
.orows{display:flex;flex-direction:column;gap:7px;padding:0 17px 17px;}
.orow{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:9px;}
.ortag{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080e1c;font-size:12px;font-weight:800;width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.orinf{flex:1;}
.ortitle{font-size:12px;font-weight:600;margin-bottom:2px;}
.orits{font-size:10px;color:var(--text2);margin-bottom:3px;}
.orrt{text-align:right;flex-shrink:0;}
.ortot{font-size:13px;font-weight:700;color:var(--gold2);}
.ortm{font-size:9px;color:var(--text2);}

/* BILL */
.blayout{display:grid;grid-template-columns:270px 1fr;height:100%;overflow:hidden;}
.bctrl{overflow-y:auto;padding:13px;border-right:1px solid var(--border2);background:var(--card);}
.bprev{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:11px;}
.receipt{background:#fff;color:#111;width:330px;border-radius:11px;font-family:'Sarabun',sans-serif;font-size:12px;box-shadow:0 4px 18px rgba(0,0,0,.5);}
.receipt::before,.receipt::after{content:'';display:block;height:9px;background:repeating-radial-gradient(circle at 8px,transparent 0,transparent 5px,#fff 5px,#fff 9px);background-size:15px 9px;background-color:#111;}
.receipt::after{transform:rotate(180deg);}
.ri{padding:15px 17px;}
.rhd{text-align:center;border-bottom:1px dashed #ddd;padding-bottom:9px;margin-bottom:9px;}
.rshop{font-size:14px;font-weight:800;}
.rsub{font-size:10px;color:#777;margin-top:2px;}
.rmeta{display:grid;grid-template-columns:auto 1fr;gap:2px 9px;margin-bottom:9px;font-size:11px;}
.rml{color:#888;}
.rmv{font-weight:600;}
.rbar{background:linear-gradient(135deg,#d4af37,#f0d060);color:#111;border-radius:6px;padding:7px 11px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:12px;}
.rith{display:grid;grid-template-columns:1fr 34px 58px;gap:2px;font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #eee;padding-bottom:3px;margin-bottom:3px;}
.rit{display:grid;grid-template-columns:1fr 34px 58px;gap:2px;font-size:11px;padding:3px 0;border-bottom:1px dotted #f0f0f0;}
.rtots{margin-top:8px;border-top:1px solid #ddd;padding-top:8px;}
.rtr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#555;}
.rtr.main{font-size:13px;font-weight:800;color:#111;border-top:2px solid #111;margin-top:5px;padding-top:5px;}
.rtr.paid{background:#d4af37;color:#111;padding:4px 7px;border-radius:4px;font-weight:700;margin-top:4px;}
.rfooter{text-align:center;margin-top:10px;padding-top:9px;border-top:1px dashed #ddd;font-size:11px;color:#555;}
.stamp{display:inline-block;border:2px solid #22c55e;color:#22c55e;font-size:9px;font-weight:800;padding:2px 9px;border-radius:3px;letter-spacing:3px;transform:rotate(-5deg);margin-top:5px;}

/* CUSTOMER */
#sCust{overflow-y:auto;height:100vh;background:linear-gradient(160deg,#0a1628,#060c18);}
.ctop{background:rgba(212,175,55,.04);border-bottom:1px solid var(--border);padding:13px;text-align:center;}
.ctag{display:inline-flex;align-items:center;gap:5px;background:rgba(212,175,55,.08);border:1px solid var(--border);color:var(--gold2);padding:3px 11px;border-radius:11px;font-size:11px;font-weight:600;margin-top:4px;}
.clayout{display:grid;grid-template-columns:1fr 255px;min-height:calc(100vh - 95px);}
.cma{padding:11px;overflow-y:auto;}
.ccat{font-size:12px;font-weight:700;color:var(--gold);padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:11px;}
.ccart{background:rgba(255,255,255,.02);border-left:1px solid var(--border);display:flex;flex-direction:column;}
.ccarthd{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;}
.ccartitems{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:4px;}
.ccartfoot{padding:10px 12px;border-top:1px solid var(--border);}

/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
.mbg.open{display:flex;}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:19px;width:90%;max-width:400px;max-height:86vh;overflow-y:auto;}
.mbox.wide{max-width:470px;}
.mtitle{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.mx{background:var(--card2);border:none;color:var(--text2);width:23px;height:23px;border-radius:6px;cursor:pointer;font-size:12px;}
.popt{background:var(--card2);border:2px solid var(--border2);border-radius:9px;padding:10px;cursor:pointer;text-align:center;transition:all .2s;}
.popt:hover,.popt.on{border-color:var(--gold);background:rgba(212,175,55,.06);}

/* TOAST */
.toast{position:fixed;bottom:17px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 17px;border-radius:9px;font-size:12px;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

@media(max-width:600px){.clayout{grid-template-columns:1fr;}.ccart{position:sticky;bottom:0;max-height:40vh;}.playout{grid-template-columns:1fr;}.opanel{display:none;}.blayout{grid-template-columns:1fr;}.bctrl{border-right:none;border-bottom:1px solid var(--border2);max-height:45vh;}}
</style>
</head>
<body>

<div class="scr show" id="sLogin">
  <div class="lbox">
    <div class="ltop">
      <span class="icon">🎤</span>
      <h1>MELODY</h1>
      <p>KARAOKE POS SYSTEM</p>
    </div>
    <div class="rtabs">
      <div class="rtab on" data-role="owner"><span>👑</span><b>เจ้าของร้าน</b></div>
      <div class="rtab" data-role="staff"><span>🧑‍💼</span><b>พนักงาน</b></div>
    </div>
    <div class="pdisp" id="pd">•</div>
    <div class="ppad">
      <button class="pb" data-k="1">1</button><button class="pb" data-k="2">2</button><button class="pb" data-k="3">3</button>
      <button class="pb" data-k="4">4</button><button class="pb" data-k="5">5</button><button class="pb" data-k="6">6</button>
      <button class="pb" data-k="7">7</button><button class="pb" data-k="8">8</button><button class="pb" data-k="9">9</button>
      <button class="pb del" id="pDel">⌫</button><button class="pb" data-k="0">0</button><button class="pb go" id="pGo">เข้าระบบ</button>
    </div>
    <div class="lhint">👑 เจ้าของ: <b style="color:var(--text2)">1234</b> &nbsp;|&nbsp; 🧑‍💼 พนักงาน: <b style="color:var(--text2)">0000</b></div>
    <div class="lerr" id="lErr"></div>
  </div>
</div>

<div class="scr" id="sApp">
  <div class="topbar">
    <div class="tlogo">🎤 MELODY</div>
    <div class="tnav-wrap" id="tNav"></div>
    <div class="tright">
      <div class="ttime" id="tTime"></div>
      <div class="rchip" id="rChip"></div>
      <button class="tbtn" id="logoutBtn">ออก</button>
    </div>
  </div>
  <div class="content">
    <div class="page" id="p-rooms">
      <div class="shd"><div class="stitle">🏠 ห้อง / โต๊ะ</div><div style="display:flex;gap:6px;"><button class="btn bo sm" id="btnManageRooms">⚙️ จัดการ</button><button class="btn bg2 sm" id="btnAddRoom">+ เพิ่ม</button></div></div>
      <div class="rg" id="rGrid"></div>
    </div>
    <div class="page" id="p-pos">
        <div class="playout">
            <div class="pl">
                <div class="ptb"><input class="psrch" id="pSrch" placeholder="🔍 ค้นหาเมนู..."></div>
                <div class="pcats" id="pCats"></div>
                <div class="mgrid" id="pGrid"></div>
            </div>
            <div class="opanel">
                <div class="ohd"><div style="font-size:12px;font-weight:700;">🛒 รายการ</div><button class="btn bo sm" id="clearBtn">ล้าง</button></div>
                <div class="olist" id="oList"></div>
                <div class="ofoot">
                    <div class="trow"><span>ยอดรวม</span><span id="cTot">฿0</span></div>
                    <button class="btn bg2 wf" id="sendBtn" disabled>📤 ส่งออเดอร์</button>
                </div>
            </div>
        </div>
    </div>
    <div class="page" id="p-orders"><div class="shd"><div class="stitle">📋 ออเดอร์</div></div><div class="orows" id="oRows"></div></div>
    <div class="page" id="p-bill">
        <div class="blayout">
            <div class="bctrl"><div style="font-size:11px;font-weight:700;color:var(--gold);">🖨️ ออกบิลแบบด่วน</div><div id="bItemsEl"></div></div>
            <div class="bprev"><div id="receiptEl"></div><button class="btn bg2" id="printBtn">🖨️ พิมพ์</button></div>
        </div>
    </div>
    <div class="page pad" id="p-settings"><h2>⚙️ ตั้งค่าระบบ</h2></div>
  </div>
</div>

<div class="scr" id="sCust">
  <div class="ctop">
    <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);">MELODY Karaoke</div>
    <div class="ctag">🏠 <span id="cRoomName">ห้อง</span></div>
  </div>
  <div class="clayout">
    <div class="cma" id="cMenu"></div>
    <div class="ccart">
      <div class="ccarthd">🛒 ตะกร้า (<span id="ccCnt">0</span>)</div>
      <div class="ccartitems" id="ccItems"></div>
      <div class="ccartfoot"><button class="btn bg2 wf" id="ccSend">📤 ส่งออเดอร์</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CFG = { ownerPin:'1234', staffPin:'0000' };
var DB = {
  rooms:[
    {id:'r1',name:'ห้อง 1',cap:6,rate:300,status:'free',sid:null},
    {id:'r2',name:'ห้อง 2',cap:10,rate:400,status:'free',sid:null}
  ],
  menu:[
    {id:'m1',name:'เบียร์สิงห์',cat:'เบียร์',price:120,emoji:'🍺',avail:true},
    {id:'m2',name:'โค้ก',cat:'น้ำดื่ม',price:35,emoji:'🥤',avail:true},
    {id:'m3',name:'ไก่ทอด',cat:'อาหาร',price:150,emoji:'🍗',avail:true}
  ],
  orders:[],
  sessions:[]
};

var CU=null,CR=null,loginRole='owner',pinVal='';
var cart=[],curRoom=null;

function $(id){return document.getElementById(id);}
function toast(msg,t){
    var el=$('toast');el.textContent=msg;el.className='toast '+(t||'');el.classList.add('show');
    setTimeout(function(){el.classList.remove('show');},2000);
}

/* LOGIN LOGIC */
function updPin(){$('pd').textContent=pinVal.length?'●'.repeat(pinVal.length):'•';}
function pinKey(k){
    if(pinVal.length<4){pinVal+=k;updPin();}
    if(pinVal.length===4)setTimeout(doLogin,250);
}
function pinDel(){pinVal=pinVal.slice(0,-1);updPin();}
function doLogin(){
  var ok=(loginRole==='owner'&&pinVal===CFG.ownerPin)||(loginRole==='staff'&&pinVal===CFG.staffPin);
  if(!ok){toast('❌ PIN ไม่ถูกต้อง','err');pinVal='';updPin();return;}
  CU={role:loginRole};CR=loginRole;
  $('sLogin').classList.remove('show');$('sApp').classList.add('show');
  buildNav();nav('rooms');renderRooms();
}

function buildNav(){
  var pgs=CR==='owner'?['rooms','pos','orders','bill','settings']:['rooms','pos','orders','bill'];
  var lbl={rooms:'🏠 ห้อง',pos:'🍺 POS',orders:'📋 ออเดอร์',bill:'🖨️ บิล',settings:'⚙️ ตั้งค่า'};
  $('tNav').innerHTML=pgs.map(p=>`<button class="tnav" onclick="nav('${p}')">${lbl[p]}</button>`).join('');
}

function nav(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  $('p-'+p).classList.add('on');
}

function renderRooms(){
  $('rGrid').innerHTML=DB.rooms.map(r=>`
    <div class="rcard ${r.status==='busy'?'busy':''}">
      <div class="rnum">${r.name}</div>
      <div class="rcap">👥 ${r.cap} คน</div>
      <span class="badge ${r.status==='busy'?'bgo':'bgg'}">${r.status==='busy'?'ไม่ว่าง':'ว่าง'}</span>
      <button class="btn bg2 wf" style="margin-top:10px" onclick="goPos('${r.id}')">เลือกห้อง</button>
    </div>
  `).join('');
}

function goPos(rid){curRoom=rid;nav('pos');renderPOS();}
function renderPOS(){
  $('pGrid').innerHTML=DB.menu.map(m=>`
    <div class="mcard" onclick="addCart('${m.id}')">
      <div class="mem">${m.emoji}</div>
      <div class="mbd"><div class="mnm">${m.name}</div><div class="mpr">฿${m.price}</div></div>
    </div>
  `).join('');
}

function addCart(mid){
  var m=DB.menu.find(x=>x.id===mid);
  var ex=cart.find(x=>x.id===mid);
  if(ex)ex.qty++;else cart.push({...m,qty:1});
  renderCart();
}

function renderCart(){
  var total=cart.reduce((s,i)=>s+(i.price*i.qty),0);
  $('oList').innerHTML=cart.map(i=>`
    <div class="oitem">
      <div class="oinf"><div class="onm">${i.name}</div><div class="opr">฿${i.price} x ${i.qty}</div></div>
    </div>
  `).join('');
  $('cTot').textContent='฿'+total;
  $('sendBtn').disabled=cart.length===0;
}

/* EVENT BINDING */
document.querySelectorAll('.rtab').forEach(el=>{
    el.onclick=function(){
        document.querySelectorAll('.rtab').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');loginRole=el.dataset.role;pinVal='';updPin();
    };
});
document.querySelectorAll('.pb[data-k]').forEach(el=>{el.onclick=()=>pinKey(el.dataset.k);});
$('pDel').onclick=pinDel;
$('pGo').onclick=doLogin;
$('logoutBtn').onclick=()=>location.reload();
</script>
</body>
</html>
